version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  google_fonts: ^8.0.2
  animate_do: ^3.3.4
  icons_plus: ^5.0.0
  supercharged: ^2.1.1
  app_links: ^6.3.0
  share_plus: ^10.1.4
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.0
  another_flushbar: ^1.12.32
  fluttertoast: ^9.0.0
  shared_preferences: ^2.5.4
  flutter_easyloading: ^3.0.5
  shimmer: ^3.0.0
  geolocator: ^13.0.1
  intl: ^0.19.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  geocoding: ^4.0.0
  file_picker: ^10.3.10
  dio: ^5.9.2
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  connectivity_plus: ^7.0.0
  internet_connection_checker_plus: ^2.9.1+2
  googleapis_auth: ^2.0.0
  http: ^1.6.0
  firebase_messaging: ^16.1.3
  cloud_firestore: ^6.2.0
  firebase_core: ^4.6.0
  app_settings: ^7.0.0
  flutter_local_notifications: ^21.0.0
  syncfusion_flutter_sliders: ^33.1.45

dev_dependencies:
  flutter_native_splash: ^2.4.7
  icons_launcher: ^3.0.3
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/onboarding/
    - assets/
    - .env

  #  flutter pub run icons_launcher:create
  # 👇 Add this at the end
icons_launcher:
  image_path: "assets/app_icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true
